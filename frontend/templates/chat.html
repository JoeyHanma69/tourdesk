<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TourDesk — Chat with us</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/chat.css" />
</head>
<body>

  <div class="chat-shell">
    <div class="chat-window">

      <!-- ── Chat header ── -->
      <header class="chat-header">
        <span class="chat-avatar">🦘</span>
        <div>
          <div class="chat-title">Turtle Down Under</div>
          <div class="chat-status">TourDesk assistant · online</div>
        </div>
      </header>

      <!-- ── Message thread ── -->
      <div id="chat-thread" class="chat-thread" aria-live="polite"></div>

      <!-- ── Composer ── -->
      <div id="chat-attach-preview" class="chat-attach-preview hidden"></div>
      <form id="chat-form" class="chat-composer">
        <button id="chat-attach" class="chat-attach" type="button" title="Attach a file or image">📎</button>
        <input id="chat-file" type="file" accept="image/*,.pdf,.doc,.docx,.txt" hidden />
        <input
          id="chat-input"
          class="chat-input"
          type="text"
          placeholder="Type your message…"
          autocomplete="off"
        />
        <button id="chat-send" class="chat-send" type="submit">Send</button>
      </form>

    </div>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
